<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Tracker 技術支援</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Noto Sans HK", "Microsoft JhengHei", sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo {
            font-size: 48px;
            text-align: center;
            margin-bottom: 20px;
        }
        h1 {
            text-align: center;
            color: #2d2d2d;
            margin-bottom: 10px;
            font-size: 24px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .info-box {
            background: #f5f5f7;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .info-box h3 {
            color: #FF6B35;
            font-size: 14px;
            margin-bottom: 10px;
        }
        .info-box p {
            color: #444;
            font-size: 14px;
            line-height: 1.6;
        }
        .contact-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }
        .contact-item:last-child {
            border-bottom: none;
        }
        .contact-icon {
            font-size: 24px;
        }
        .contact-text {
            flex: 1;
        }
        .contact-label {
            font-size: 12px;
            color: #888;
        }
        .contact-value {
            font-size: 14px;
            color: #2d2d2d;
        }
        .email-link {
            color: #3B82F6;
            text-decoration: none;
            font-weight: 500;
        }
        .email-link:hover {
            text-decoration: underline;
        }
        .footer {
            text-align: center;
            margin-top: 30px;
            font-size: 12px;
            color: #888;
        }
        .app-info {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        .app-name {
            font-size: 16px;
            font-weight: 600;
            color: #2d2d2d;
        }
        .app-version {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🏀</div>
        <h1>Team Tracker</h1>
        <p class="subtitle">籃球隊管理應用程式 - 技術支援</p>
        
        <div class="info-box">
            <h3>ℹ️ 關於我們</h3>
            <p>Team Tracker 是一款專為籃球愛好者設計的應用程式，幫助你輕鬆管理球隊、球員數據和賽事安排。</p>
        </div>
        
        <div class="contact-item">
            <span class="contact-icon">📧</span>
            <div class="contact-text">
                <div class="contact-label">電子郵件</div>
                <div class="contact-value">
                    <a href="mailto:support@teamtracker.hk" class="email-link">support@teamtracker.hk</a>
                </div>
            </div>
        </div>
        
        <div class="contact-item">
            <span class="contact-icon">🌐</span>
            <div class="contact-text">
                <div class="contact-label">官方網站</div>
                <div class="contact-value">
                    <a href="https://teamtracker.hk" class="email-link">https://teamtracker.hk</a>
                </div>
            </div>
        </div>
        
        <div class="contact-item">
            <span class="contact-icon">🐛</span>
            <div class="contact-text">
                <div class="contact-label">報告問題</div>
                <div class="contact-value">通過電子郵件聯繫我們，我們會盡快回覆</div>
            </div>
        </div>
        
        <div class="app-info">
            <div class="app-name">Team Tracker</div>
            <div class="app-version">版本 1.0.0</div>
        </div>
        
        <div class="footer">
            © 2024 Team Tracker. All rights reserved.
        </div>
    </div>
</body>
</html>
