workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 120
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.basketball.team.tracker"
      # --- 修改這裡 ---
      ios_signing:
        distribution_type: app_store  # 指定發佈類型
        bundle_identifier: com.basketball.team.tracker # 必須與 Apple Portal 一致
    scripts:
      - name: Get Flutter packages
        script: |
          rm -f pubspec.lock
          flutter packages pub get
      - name: Install Pods
        script: |
          find . -name "Podfile" -execdir pod install \;
      - name: Build IPA
        script: |
          # 這裡加上 --build-number 確保每次上傳不會重複
          flutter build ipa --release \
            --export-method=app-store \
            --build-number=$BUILD_NUMBER
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - wilson1e@icloud.com