workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 120
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.basketball.team.tracker"
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.basketball.team.tracker
    scripts:
      - name: Get Flutter packages
        script: |
          rm -f pubspec.lock
          flutter packages pub get
      - name: Build IPA
        script: flutter build ipa --release
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - wilson1e@icloud.com
  android-workflow:
    name: Android Workflow
    max_build_duration: 120
    environment:
      flutter: stable
      groups:
        - google_play
    scripts:
      - name: Get Flutter packages
        script: |
          rm -f pubspec.lock
          flutter packages pub get
      - name: Build AAB
        script: flutter build appbundle --release
    artifacts:
      - build/app/outputs/bundle/release/*.aab
    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
