workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 120
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.basketball.team.tracker"
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.basketball.team.tracker
    scripts:
      - name: Get Flutter packages
        script: |
          rm -f pubspec.lock
          flutter packages pub get
      - name: Install Pods
        script: |
          cd ios && pod install
      - name: Build IPA
        script: |
          flutter build ipa --release \
            --export-method=app-store \
            --build-number=$BUILD_NUMBER
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - wilson1e@icloud.com

  android-workflow:
    name: Android Workflow
    # ... 保持你原本的 Android 部分不變 ...